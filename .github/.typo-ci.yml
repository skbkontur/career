# https://github.com/TypoCI/spellcheck-action/tree/master?tab=readme-ov-file
dictionaries:
  - en
  - ru

# Any files/folders we should ignore?
excluded_files:
  - ".typo-ci.yml"
  - ".github/.typo-ci.yml"

# Any words we should ignore?
excluded_words:
  - typoci

# Would you like filenames to also be spellchecked?
spellcheck_filenames: true